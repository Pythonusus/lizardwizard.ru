<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">pythonusus.ru icon</title>
  <desc id="desc">Simple icon with a bold letter P for pythonusus.ru</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1029" />
      <stop offset="100%" stop-color="#3b0764" />
    </linearGradient>
    <linearGradient id="highlight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#3730a3" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="pFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ddd6fe" />
      <stop offset="55%" stop-color="#c4b5fd" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    <linearGradient id="pStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#312e81" />
      <stop offset="100%" stop-color="#5b21b6" />
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="108" fill="url(#bg)" />
  <rect x="36" y="36" width="440" height="440" rx="92" fill="none" stroke="#7c3aed" stroke-opacity="0.35" stroke-width="8" />

  <text
    x="256"
    y="398"
    text-anchor="middle"
    font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif"
    font-size="400"
    font-weight="800"
    letter-spacing="-8"
    fill="url(#pFill)"
    stroke="url(#pStroke)"
    stroke-width="14"
    paint-order="stroke fill"
  >
    P
